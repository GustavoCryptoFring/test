<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Ninja Parkour — карты и текстуры</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
<script src="map.js"></script>
<style>
  html, body { margin:0; padding:0; height:100%; background:#8ed6ff; overflow:hidden;
    font-family:system-ui, sans-serif; -webkit-user-select:none; user-select:none; }
  #game-wrap { position:relative; width:100vw; height:100vh; display:flex;
    align-items:center; justify-content:center; }
  #game canvas { image-rendering:pixelated; }
  #touch { position:absolute; inset:0; pointer-events:none; }
  .btn { position:absolute; bottom:18px; width:64px; height:64px; border-radius:16px;
    background:rgba(20,20,40,.3); border:2px solid rgba(255,255,255,.5); color:#fff;
    font-size:22px; display:flex; align-items:center; justify-content:center;
    pointer-events:auto; touch-action:none; backdrop-filter:blur(2px); }
  .btn:active { background:rgba(20,20,40,.55); }
  #btn-left{left:18px;} #btn-right{left:92px;}
  #btn-jump{right:18px; width:84px; background:rgba(60,180,90,.35);}
</style>
</head>
<body>
<div id="game-wrap">
  <div id="game"></div>
  <div id="touch">
    <div id="btn-left" class="btn">◀</div>
    <div id="btn-right" class="btn">▶</div>
    <div id="btn-jump" class="btn">JUMP</div>
  </div>
</div>

<script>
// ===========================================================================
//  ФИЗИКА
// ===========================================================================
const DESIGN_W = 800, DESIGN_H = 450;
const SPEED = 240, JUMP = 560, GRAVITY = 1300, MAX_JUMPS = 2;

// ===========================================================================
//  КАРТЫ грузятся из отдельного файла map.js (он подключён в <head>).
//  Чтобы сменить карту — меняешь содержимое map.js (вставляешь туда экспорт
//  из редактора). Формат map.js: const MAPS = [ {...} ];
// ===========================================================================

let currentMap = 0;  // активная карта (на финише сама переходит к следующей; клавиши 1/2/3 — вручную)

// ===========================================================================
let controls = { left:false, right:false, jump:false };

class Game extends Phaser.Scene {

  preload() {
    // =====================================================================
    //  ТВОИ ТЕКСТУРЫ
    //  1) Положи PNG рядом с index.html (удобно в папку assets/).
    //  2) Раскомментируй нужные строки. Ключ ('ninja','sushi'...) должен
    //     совпадать с тем, что используется в коде и в полях tex у платформ.
    //  Загруженная картинка автоматически заменит рисованный плейсхолдер.
    // =====================================================================
    // this.load.image('ninja',     'assets/ninja.png');
    // this.load.image('sushi',     'assets/sushi.png');
    // this.load.image('chopstick', 'assets/chopstick.png');
    // this.load.image('bamboo',    'assets/bamboo.png');
    // this.load.image('bowl',      'assets/bowl.png');
    // this.load.image('cup',       'assets/cup.png');
    // this.load.image('coin',      'assets/coin.png');
    // this.load.image('umbrella',  'assets/umbrella.png');
    // this.load.image('dirt',      'assets/dirt.png');
    // this.load.image('grass',     'assets/grass.png');
  }

  create() {
    ensureTextures(this);   // дорисовывает плейсхолдеры для всех ключей, которых ты ещё не загрузил
    const map = MAPS[currentMap];
    this.map = map;

    this.physics.world.setBounds(0, -300, map.width, map.height + 600);
    this.cameras.main.setBounds(0, 0, map.width, map.height);
    this.cameras.main.setBackgroundColor('#8ed6ff');

    for (let i = 0; i < 26; i++) {
      this.add.image(Phaser.Math.Between(0, map.width), Phaser.Math.Between(100, map.height), 'cloud')
        .setScrollFactor(0.5).setAlpha(0.85).setScale(Phaser.Math.FloatBetween(0.7, 1.7));
    }

    if (map.deathY !== null) {
      this.add.tileSprite(0, map.deathY, map.width, map.height - map.deathY + 200, 'water')
        .setOrigin(0, 0).setDepth(-1);
    }

    this.solids = [];
    map.platforms.forEach(p => this.makeBlock(p));

    this.hazardGroup = this.physics.add.staticGroup();
    (map.hazards || []).forEach(h => {
      const s = this.hazardGroup.create(h.x, h.y, 'shuriken');
      s.body.setSize(14, 14);
      this.tweens.add({ targets: s, angle: 360, duration: 1100, repeat: -1 });
    });

    // Игрок
    this.player = this.physics.add.sprite(map.spawn.x, map.spawn.y, 'ninja');
    this.player.body.setSize(16, 22).setOffset(1, 1);
    this.player.setMaxVelocity(SPEED, 2000);
    this.physics.add.collider(this.player, this.solids);
    this.physics.add.overlap(this.player, this.hazardGroup, () => this.respawn());

    this.cameras.main.startFollow(this.player, true, 0.12, 0.14);
    this.cameras.main.setDeadzone(160, 90);

    this.keys = this.input.keyboard.addKeys('W,A,S,D,SPACE,UP,LEFT,RIGHT,ONE,TWO,THREE');
    this.jumpsLeft = MAX_JUMPS;
    this.bestUp = 0; this.won = false; this.startTime = this.time.now;

    this.uiUp   = this.add.text(12, 10, '↑ 0 м', uiStyle()).setScrollFactor(0).setDepth(10);
    this.uiTime = this.add.text(DESIGN_W-12, 10, '00:00.0', uiStyle()).setScrollFactor(0).setOrigin(1,0).setDepth(10);
    this.uiName = this.add.text(DESIGN_W/2, 10, map.name, { ...uiStyle(), fontSize:'16px' }).setScrollFactor(0).setOrigin(0.5,0).setDepth(10);
    this.uiMsg  = this.add.text(DESIGN_W/2, DESIGN_H/2, '', { ...uiStyle(), fontSize:'26px', align:'center' }).setScrollFactor(0).setOrigin(0.5).setDepth(10);
  }

  // Объект карты. p.decor:true — без столкновения (фон). p.tex — текстура (если есть),
  // иначе земля+трава. Если tex задан, но текстура не загружена — фолбэк на землю.
  makeBlock(p) {
    const { x, y, w, h } = p;
    const hasTex = p.tex && this.textures.exists(p.tex);

    if (p.decor) {                                   // декорация: только рисунок, без коллайдера
      if (hasTex) this.add.tileSprite(x, y, w, h, p.tex).setOrigin(0, 0).setDepth(-1).setAlpha(0.95);
      return;
    }
    if (hasTex) {
      this.add.tileSprite(x, y, w, h, p.tex).setOrigin(0, 0);
    } else {
      this.add.tileSprite(x, y, w, h, 'dirt').setOrigin(0, 0);
      this.add.tileSprite(x, y, w, 8, 'grass').setOrigin(0, 0).setDepth(1);
    }
    const z = this.add.zone(x, y, w, h).setOrigin(0, 0);
    this.physics.add.existing(z, true);
    z.body.updateFromGameObject();
    this.solids.push(z);
    if (p.goal) this.add.image(x + w/2, y, 'flag').setOrigin(0.5, 1).setDepth(2);
  }

  respawn() {
    this.player.setPosition(this.map.spawn.x, this.map.spawn.y);
    this.player.setVelocity(0, 0);
    this.jumpsLeft = MAX_JUMPS;
  }

  update() {
    if (this.won) return;
    const p = this.player, k = this.keys, map = this.map;

    if (Phaser.Input.Keyboard.JustDown(k.ONE))   { currentMap = 0; this.scene.restart(); return; }
    if (Phaser.Input.Keyboard.JustDown(k.TWO)   && MAPS[1]) { currentMap = 1; this.scene.restart(); return; }
    if (Phaser.Input.Keyboard.JustDown(k.THREE) && MAPS[2]) { currentMap = 2; this.scene.restart(); return; }

    const left  = controls.left  || k.A.isDown || k.LEFT.isDown;
    const right = controls.right || k.D.isDown || k.RIGHT.isDown;
    if (left && !right)      { p.setVelocityX(-SPEED); p.setFlipX(true); }
    else if (right && !left) { p.setVelocityX(SPEED);  p.setFlipX(false); }
    else                     { p.setVelocityX(0); }

    const onGround = p.body.blocked.down || p.body.touching.down;
    if (onGround) this.jumpsLeft = MAX_JUMPS;
    const wantJump = controls.jump
      || Phaser.Input.Keyboard.JustDown(k.SPACE)
      || Phaser.Input.Keyboard.JustDown(k.W)
      || Phaser.Input.Keyboard.JustDown(k.UP);
    controls.jump = false;
    if (wantJump && this.jumpsLeft > 0) { p.setVelocityY(-JUMP); this.jumpsLeft--; }

    if (map.deathY !== null && p.y > map.deathY) this.respawn();
    if (p.y > map.height + 400) this.respawn();

    if (p.y <= map.goalY) { this.win(); return; }

    const up = Math.max(0, Math.floor((map.spawn.y - p.y) / 32));
    this.bestUp = Math.max(this.bestUp, up);
    this.uiUp.setText('↑ ' + this.bestUp + ' м');
    this.uiTime.setText(formatTime((this.time.now - this.startTime) / 1000));
  }

  win() {
    this.won = true;
    this.player.setVelocity(0, 0);
    const t = formatTime((this.time.now - this.startTime) / 1000);
    const next = (currentMap + 1) % MAPS.length;
    this.uiMsg.setText('ВЕРШИНА!\n' + t + '\n\n(нажми — следующая карта)');
    const go = () => { currentMap = next; this.scene.restart(); };
    this.input.once('pointerdown', go);
    this.input.keyboard.once('keydown', go);
  }
}

// ---- Вспомогательное ----
function uiStyle() {
  return { fontFamily:'monospace', fontSize:'20px', color:'#fff', stroke:'#1c2a40', strokeThickness:4 };
}
function formatTime(s) {
  const m = Math.floor(s/60), sec = (s%60).toFixed(1).padStart(4,'0');
  return String(m).padStart(2,'0') + ':' + sec;
}

// Рисует плейсхолдер-текстуру ТОЛЬКО если такой ключ ещё не загружен из файла.
// Значит: загрузил свой PNG в preload() -> используется он; не загрузил -> рисунок ниже.
function ensureTextures(scene) {
  const g = scene.make.graphics({ x:0, y:0, add:false });
  const make = (key, w, h, draw) => {
    if (scene.textures.exists(key)) return;   // твоя картинка уже есть — не трогаем
    g.clear(); draw(); g.generateTexture(key, w, h);
  };

  make('dirt', 16, 16, () => { g.fillStyle(0xd77f2c).fillRect(0,0,16,16);
    g.fillStyle(0xc06f24).fillRect(2,4,3,3).fillRect(9,9,3,3).fillRect(12,2,2,2); });
  make('grass', 16, 8, () => { g.fillStyle(0x57c23a).fillRect(0,0,16,8); g.fillStyle(0x7ad94f).fillRect(0,0,16,3); });
  make('water', 32, 16, () => { g.fillStyle(0x3aa0e0).fillRect(0,0,32,16); g.fillStyle(0x59b6ef).fillRect(0,0,32,4); });
  make('cloud', 64, 30, () => { g.fillStyle(0xffffff,.95);
    g.fillRoundedRect(0,8,64,18,9).fillCircle(18,14,12).fillCircle(40,12,14).fillCircle(52,16,10); });
  make('shuriken', 18, 18, () => { g.fillStyle(0x9aa3ad);
    g.fillTriangle(9,0,12,9,6,9).fillTriangle(18,9,9,12,9,6).fillTriangle(9,18,6,9,12,9).fillTriangle(0,9,9,6,9,12);
    g.fillStyle(0x3a3f47).fillCircle(9,9,2); });
  make('flag', 16, 44, () => { g.fillStyle(0x6b4a2b).fillRect(2,0,3,44); g.fillStyle(0xe23b3b).fillTriangle(5,2,15,8,5,14); });

  // тематические платформы-плейсхолдеры (заменишь своими PNG)
  make('sushi', 32, 18, () => { g.fillStyle(0xf2efe6).fillRoundedRect(0,6,32,12,4); g.fillStyle(0xf07a59).fillRoundedRect(0,0,32,9,4); });
  make('chopstick', 32, 12, () => { g.fillStyle(0xb5732f).fillRect(0,3,32,6); g.fillStyle(0x8f5722).fillRect(0,8,32,2); });
  make('cup', 24, 22, () => { g.fillStyle(0x3aa0e0).fillRoundedRect(2,2,20,18,4); g.fillStyle(0x9fd6f5).fillRect(4,4,16,4); });
  make('bowl', 32, 16, () => { g.fillStyle(0xcfa15a).fillRoundedRect(0,4,32,12,5); g.fillStyle(0xeedcc0).fillRect(3,5,26,3); });
  make('coin', 24, 24, () => { g.fillStyle(0xe8b94a).fillCircle(12,12,11); g.fillStyle(0xbf962f).fillCircle(12,12,11); g.fillStyle(0xe8b94a).fillCircle(12,12,9); g.fillStyle(0xbf962f).fillRect(8,8,8,8); });
  make('bamboo', 32, 12, () => { g.fillStyle(0xe0c060).fillRect(0,2,32,8); g.fillStyle(0xc9a83f).fillRect(10,2,2,8).fillRect(22,2,2,8); });
  make('umbrella', 64, 48, () => { g.fillStyle(0xe0604a).fillTriangle(0,40,32,2,64,40); g.fillStyle(0xb84436).fillRect(30,40,4,8); });
  make('mask', 48, 40, () => { g.fillStyle(0xeef0f5).fillRoundedRect(2,2,44,36,10); g.fillStyle(0xf03a7a).fillRect(10,14,10,4).fillRect(28,14,10,4); });
  make('lantern', 32, 48, () => { g.fillStyle(0xe0a83a).fillRoundedRect(4,4,24,32,8); g.fillStyle(0xc97f2a).fillRect(6,18,20,3); g.fillStyle(0xd23b3b).fillRect(14,36,4,10); });

  // ===== НИНДЗЯ (модель игрока) — ЗАМЕНИ НА СВОЙ PNG (ключ 'ninja') =====
  make('ninja', 18, 24, () => {
    g.fillStyle(0x2f2f45).fillRoundedRect(1,6,16,16,5);
    g.fillStyle(0xe8e8ef).fillRect(3,11,12,4);
    g.fillStyle(0x2f2f45).fillRect(7,12,2,2).fillRect(11,12,2,2);
    g.fillStyle(0x57c23a).fillRect(5,1,2,6).fillRect(10,1,2,6);
  });
  // =====================================================================

  g.destroy();
}

// ---- Запуск ----
new Phaser.Game({
  type: Phaser.AUTO, parent: 'game', width: DESIGN_W, height: DESIGN_H,
  pixelArt: true, roundPixels: true,
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  physics: { default: 'arcade', arcade: { gravity: { y: GRAVITY } } },
  scene: Game,
});

// ---- Экранные кнопки ----
function bind(id, key) {
  const el = document.getElementById(id);
  const on  = e => { e.preventDefault(); controls[key] = true; };
  const off = e => { e.preventDefault(); controls[key] = false; };
  ['pointerdown'].forEach(ev => el.addEventListener(ev, on));
  ['pointerup','pointercancel','pointerleave'].forEach(ev => el.addEventListener(ev, off));
}
bind('btn-left', 'left');
bind('btn-right', 'right');
document.getElementById('btn-jump').addEventListener('pointerdown', e => { e.preventDefault(); controls.jump = true; });

// ---- Telegram ----
if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}
</script>
</body>
</html>
